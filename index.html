<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Product Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-light">

    <div class="container mt-4">
        <h2 class="text-center mb-4">Product Dashboard</h2>

        <!-- Search & Limit -->
        <div class="row mb-3">
            <div class="col-md-6">
                <input type="text" id="searchInput" class="form-control" placeholder="Search by title..."
                    oninput="handleSearch()">
            </div>
            <div class="col-md-3">
                <select id="limitSelect" class="form-select" onchange="changeLimit()">
                    <option value="5">5 items</option>
                    <option value="10" selected>10 items</option>
                    <option value="20">20 items</option>
                </select>
            </div>
        </div>

        <!-- Table -->
        <div class="table-responsive">
            <table class="table table-bordered table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>Image</th>
                        <th onclick="sortBy('title')" class="sortable">Title &#8597;</th>
                        <th onclick="sortBy('price')" class="sortable">Price &#8597;</th>
                        <th>Category</th>
                    </tr>
                </thead>
                <tbody id="productTable"></tbody>
            </table>
        </div>

        <!-- Pagination -->
        <nav>
            <ul class="pagination justify-content-center" id="pagination"></ul>
        </nav>
    </div>

    <script>
        let products = [];
        let filteredProducts = [];
        let currentPage = 1;
        let limit = 10;
        let sortDirection = 1;
        let sortField = null;
        const PLACEHOLDER =
            "data:image/svg+xml;utf8," +
            "<svg xmlns='http://www.w3.org/2000/svg' width='60' height='60' viewBox='0 0 60 60'>" +
            "<rect width='60' height='60' fill='%23f1f5f9'/>" +
            "<path d='M18 38l8-10 7 8 6-7 9 9H18z' fill='%23cbd5e1'/>" +
            "<circle cx='23' cy='22' r='4' fill='%23cbd5e1'/>" +
            "</svg>";

        // Fetch API
        fetch("https://api.escuelajs.co/api/v1/products")
            .then(res => res.json())
            .then(data => {
                products = data;
                filteredProducts = [...products];
                renderTable();
            });

        // Render Table
        function renderTable() {
            const table = document.getElementById("productTable");
            table.innerHTML = "";

            const start = (currentPage - 1) * limit;
            const end = start + limit;
            const pageData = filteredProducts.slice(start, end);

            pageData.forEach(product => {
                const imageUrl = safeImage(product.images) || safeImage([product.category?.image]);
                const row = `
            <tr class="product-row">
                <td>
                    <img src="${imageUrl || PLACEHOLDER}" class="product-img" alt="" loading="lazy" referrerpolicy="no-referrer">
                </td>
                <td>
                    <div class="fw-semibold">${product.title}</div>
                    <div class="text-muted small">${product.description}</div>
                </td>
                <td>$${product.price}</td>
                <td>${product.category?.name || ""}</td>
            </tr>
        `;
                table.innerHTML += row;
            });

            table.querySelectorAll(".product-img").forEach(img => {
                img.addEventListener("error", () => {
                    if (img.src !== PLACEHOLDER) {
                        img.src = PLACEHOLDER;
                    }
                }, { once: true });
            });

            renderPagination();
        }

        // Search
        function handleSearch() {
            const keyword = document.getElementById("searchInput").value.toLowerCase();
            filteredProducts = products.filter(p =>
                p.title.toLowerCase().includes(keyword)
            );
            currentPage = 1;
            renderTable();
        }

        // Sort
        function sortBy(field) {
            if (sortField === field) {
                sortDirection *= -1;
            } else {
                sortField = field;
                sortDirection = 1;
            }

            filteredProducts.sort((a, b) => {
                if (a[field] < b[field]) return -1 * sortDirection;
                if (a[field] > b[field]) return 1 * sortDirection;
                return 0;
            });

            renderTable();
        }

        // Pagination
        function renderPagination() {
            const totalPages = Math.ceil(filteredProducts.length / limit);
            const pagination = document.getElementById("pagination");
            pagination.innerHTML = "";

            for (let i = 1; i <= totalPages; i++) {
                pagination.innerHTML += `
            <li class="page-item ${i === currentPage ? 'active' : ''}">
                <button class="page-link" onclick="goToPage(${i})">${i}</button>
            </li>
        `;
            }
        }

        function goToPage(page) {
            currentPage = page;
            renderTable();
        }

        // Change limit
        function changeLimit() {
            limit = parseInt(document.getElementById("limitSelect").value);
            currentPage = 1;
            renderTable();
        }

        function safeImage(images) {
            if (!Array.isArray(images) || images.length === 0) return "";
            const firstValid = images.find(url => typeof url === "string" && url.trim().length > 0);
            if (!firstValid) return "";
            const cleaned = firstValid.replace(/^"+|"+$/g, "").trim();
            if (cleaned.startsWith("[")) {
                try {
                    const parsed = JSON.parse(cleaned);
                    if (Array.isArray(parsed) && parsed[0]) return String(parsed[0]);
                } catch { }
            }
            return cleaned;
        }
    </script>

</body>

</html>
